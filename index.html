<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="普通高中生 · 16y · Taiwan · Discord bot developer">
  <meta property="og:title" content="網路農夫 | Farmernet">
  <meta property="og:description" content="普通高中生 · 16y · Taiwan · Discord bot developer">
  <meta property="og:image" content="preview.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>Farmernet's website</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.discordapp.com" crossorigin>
  <link rel="preconnect" href="https://api.lanyard.rest" crossorigin>
  <link rel="preconnect" href="https://r2.guns.lol" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Covered+By+Your+Grace&family=Noto+Serif+HK:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/effects.css">
  <link rel="stylesheet" href="styles/player.css">
</head>

<body>

  <div class="gate-overlay" id="gate-overlay" role="button" tabindex="0" aria-label="進入網站">
    <div class="gate-text" id="gate-text">here's my secret base</div>
    <p class="gate-hint" aria-hidden="true">點擊任意處進入</p>
    <div class="gate-particles" id="gate-particles"></div>
  </div>
  <div class="cursor-dot" id="cursor-dot"></div>
  <div class="cursor-ring" id="cursor-ring"></div>

  <div class="tv-screen">
    <!--
    preload="none" — video bytes are not fetched until the user dismisses the gate.
    Use an existing local image as poster to avoid 404 on missing poster assets.
    MP4 is the primary source.
  -->
    <video id="bg-video" muted loop playsinline preload="none" poster="preview.png">
      <source src="https://r2.guns.lol/6f5ba0f9-9523-47ec-85f2-23f827d8d3ee.mp4" type="video/mp4">
    </video>
    <canvas id="tv-noise"></canvas>
    <div class="scanlines"></div>
    <div class="crt-flicker"></div>
    <div class="crt-roll"></div>
  </div>

  <div id="scene">
    <div class="card glass-panel" id="card">
      <div class="card-glow"></div>

      <!-- Avatar -->
      <div class="avatar-row">
        <div class="avatar-ring"><img src="avatar.gif" alt="Avatar" width="88" height="88" decoding="async"
            loading="lazy" fetchpriority="low"></div>
      </div>

      <!-- Body -->
      <div class="card-body">

        <h1 class="name" data-text="網路農夫">網路農夫</h1>

        <div class="divider"></div>

        <p class="bio">
          普通高中生 · 16y · Taiwan<br>
          Discord bot developer<br>
          <span class="bio-sub">Satan represents responsibility to the responsible instead of concern for psychic vampires.</span>
        </p>

        <div class="divider"></div>

        <!-- Discord Status -->
        <div class="discord-box">
          <div class="dc-top">
            <div class="dc-av-wrap">
              <div class="dc-avatar" id="dc-avatar">
                <svg viewBox="0 0 24 24">
                  <path
                    d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z" />
                </svg>
              </div>
              <img class="dc-avatar-deco"
                src="https://cdn.discordapp.com/avatar-decoration-presets/a_8bb33310339200d8d40024583ed95d4a.png" alt=""
                aria-hidden="true" decoding="async" loading="lazy" onerror="this.style.display='none'">
              <div class="dc-dot offline" id="dc-dot"></div>
            </div>
            <div class="dc-head">
              <div class="dc-identity">
                <div class="dc-username" id="dc-username">載入中…</div>
                <div class="dc-server-tag" id="dc-server-tag">
                  <img class="dc-server-icon" src="servertag.png" alt="" decoding="async" loading="lazy"
                    onerror="this.style.display='none'">
                  <span class="dc-server-label">CODE</span>
                </div>
                <div class="dc-badges" id="dc-badges">
                  <img class="dc-badge-icon" src="nitrobadge.png" alt="Nitro" decoding="async" loading="lazy"
                    onerror="this.style.display='none'">
                  <img class="dc-badge-icon" src="hypesquadbadge.png" alt="HypeSquad" decoding="async" loading="lazy"
                    onerror="this.style.display='none'">
                </div>
              </div>
              <div class="dc-tag" id="dc-tag"></div>
              <div class="dc-status-text" id="dc-status-text"></div>
            </div>
          </div>
          <!-- Activity row (hidden until loaded) -->
          <div class="dc-activity-row" id="dc-activity-row">
            <div class="dc-act-img" id="dc-act-img">
              <div class="dc-act-img-small" id="dc-act-img-small" style="display:none"></div>
            </div>
            <div class="dc-act-info">
              <div class="dc-act-label" id="dc-act-label">Playing</div>
              <div class="dc-act-name" id="dc-act-name"></div>
              <div class="dc-act-detail" id="dc-act-detail"></div>
              <div class="dc-act-elapsed" id="dc-act-elapsed"></div>
            </div>
          </div>
        </div>

        <!-- Social icons configured via config.json -->
        <div class="socials" id="socials"></div>

      </div><!-- /card-body -->
    </div><!-- /card -->

    <!-- Music Player -->
    <div class="player glass-panel" id="player">
      <div class="player-glow"></div>
      <div class="player-body">

        <!-- Album Art -->
        <div class="player-album-art">
          <img class="album-cover-img hidden" id="album-cover" src="music.png" alt="Album Cover" width="72" height="72"
            decoding="async">
          <div class="vinyl" id="vinyl"></div>
          <div class="music-icon" id="music-icon">
            <span class="material-symbols-outlined">music_note</span>
          </div>
        </div>

        <!-- Right: track info + progress + controls -->
        <div class="player-right">
          <div class="player-track-info">
            <div class="track-name" id="track-name">自由に捕らわれる。</div>
            <div class="track-artist" id="track-artist">カンザキイオリ</div>
          </div>

          <div class="player-progress-row">
            <span class="time-label" id="time-cur">0:00</span>
            <div class="progress-track" id="progress-track">
              <div class="progress-fill" id="progress-fill"></div>
            </div>
            <span class="time-label end" id="time-total">0:00</span>
          </div>

          <div class="player-controls">
            <button class="ctrl-btn" id="btn-prev" aria-label="倒退 10 秒"><span class="material-symbols-outlined">skip_previous</span></button>
            <button class="ctrl-btn play-btn" id="btn-play" aria-label="播放"><span class="material-symbols-outlined"
                id="play-icon">play_arrow</span></button>
            <button class="ctrl-btn" id="btn-next" aria-label="快轉 10 秒"><span class="material-symbols-outlined">skip_next</span></button>
          </div>
        </div>

      </div>
    </div>

  </div><!-- /scene -->

  <audio id="audio-el" preload="none">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    'use strict';

    // ── requestIdleCallback polyfill ──
    const onIdle = window.requestIdleCallback
      ? cb => requestIdleCallback(cb, { timeout: 2000 })
      : cb => setTimeout(cb, 1);

    // ── Low-end device detection → disable heavy animations ──
    (function detectLowEnd() {
      const lowCPU = navigator.hardwareConcurrency != null && navigator.hardwareConcurrency <= 4;
      const lowRAM = navigator.deviceMemory != null && navigator.deviceMemory <= 2;
      if (lowCPU || lowRAM) document.documentElement.classList.add('low-performance');
    })();

    // ── Music player (critical path — runs immediately) ──
    const audio = document.getElementById('audio-el');
    const bgVideo = document.getElementById('bg-video');
    const btnPlay = document.getElementById('btn-play');
    const playIcon = document.getElementById('play-icon');
    const vinyl = document.getElementById('vinyl');
    const fillEl = document.getElementById('progress-fill');
    const trackEl = document.getElementById('progress-track');
    const timeCur = document.getElementById('time-cur');
    const timeTot = document.getElementById('time-total');
    const albumCover = document.getElementById('album-cover');
    const musicIcon = document.getElementById('music-icon');

    const fmt = s => { const n = Math.floor(s); return `${Math.floor(n / 60)}:${String(n % 60).padStart(2, '0')}`; };
    const playerEl = document.getElementById('player');
    const sceneEl = document.getElementById('scene');
    const setPlaybackUi = isPlaying => {
      playIcon.textContent = isPlaying ? 'pause' : 'play_arrow';
      vinyl.style.animationPlayState = isPlaying ? 'running' : 'paused';
      if (playerEl) playerEl.classList.toggle('is-playing', isPlaying);
      if (btnPlay) btnPlay.setAttribute('aria-label', isPlaying ? '暫停' : '播放');
    };

    const showAlbumCover = () => { albumCover.classList.remove('hidden'); vinyl.style.display = 'none'; musicIcon.style.display = 'none'; };
    const hideAlbumCover = () => { albumCover.classList.add('hidden'); vinyl.style.display = 'flex'; musicIcon.style.display = 'flex'; };
    albumCover.addEventListener('load', showAlbumCover);
    albumCover.addEventListener('error', hideAlbumCover);
    if (albumCover.complete) { albumCover.naturalWidth > 0 ? showAlbumCover() : hideAlbumCover(); }

    audio.addEventListener('loadedmetadata', () => timeTot.textContent = fmt(audio.duration));
    audio.addEventListener('timeupdate', () => {
      if (!audio.duration) return;
      fillEl.style.width = (audio.currentTime / audio.duration * 100) + '%';
      timeCur.textContent = fmt(audio.currentTime);
    });
    audio.addEventListener('play', () => setPlaybackUi(true));
    audio.addEventListener('pause', () => setPlaybackUi(false));
    audio.addEventListener('ended', () => setPlaybackUi(false));

    btnPlay.addEventListener('click', () => {
      if (audio.paused) {
        const p = audio.play();
        if (p?.then) p.then(() => setPlaybackUi(true)).catch(() => setPlaybackUi(false));
        else setPlaybackUi(!audio.paused);
      } else {
        audio.pause();
        setPlaybackUi(false);
      }
    });
    trackEl.addEventListener('click', e => {
      if (!audio.duration) return;
      const r = trackEl.getBoundingClientRect();
      audio.currentTime = (e.clientX - r.left) / r.width * audio.duration;
    });
    document.getElementById('btn-next').addEventListener('click', () => audio.currentTime = Math.min(audio.currentTime + 10, audio.duration || 0));
    document.getElementById('btn-prev').addEventListener('click', () => audio.currentTime = Math.max(audio.currentTime - 10, 0));

    // ── Autoplay helpers ──
    const tryAutoPlay = () => {
      if (audio.preload === 'none') {
        audio.preload = 'metadata';
        audio.load();
      }
      const p = audio.play();
      if (p?.catch) p.catch(() => { });
    };
    const tryPlayVideo = () => {
      if (!bgVideo) return;
      // Trigger the video to load if it hasn't yet, then play
      if (bgVideo.preload === 'none') { bgVideo.preload = 'auto'; bgVideo.load(); }
      const p = bgVideo.play(); if (p?.catch) p.catch(() => { });
    };

    // ── Gate overlay ──
    const gateOverlay = document.getElementById('gate-overlay');
    const gateText = document.getElementById('gate-text');
    const gateParticles = document.getElementById('gate-particles');

    const spawnGateParticles = () => {
      if (!gateText || !gateParticles || gateParticles.childElementCount) return;
      const r = gateText.getBoundingClientRect();
      const lowPerf = document.documentElement.classList.contains('low-performance');
      const count = Math.max(lowPerf ? 18 : 28, Math.min(lowPerf ? 32 : 56, Math.floor((r.width * r.height) / 64)));
      const frag = document.createDocumentFragment();
      for (let i = 0; i < count; i++) {
        const p = document.createElement('span');
        p.className = 'gate-particle';
        const size = 3 + Math.random() * 6.5;
        p.style.cssText = `left:${r.left + Math.random() * r.width}px;top:${r.top + Math.random() * r.height}px;width:${size}px;height:${size}px`;
        p.style.setProperty('--dx', `${(Math.random() * 2 - 1) * (80 + Math.random() * 200)}px`);
        p.style.setProperty('--dy', `${(Math.random() * 2 - 1) * (60 + Math.random() * 180)}px`);
        p.style.setProperty('--float-x', `${(Math.random() * 2 - 1) * 18}px`);
        p.style.setProperty('--float-y', `${-8 - Math.random() * 22}px`);
        p.style.setProperty('--idle-dur', `${2.6 + Math.random() * 2.4}s`);
        p.style.setProperty('--dur', `${0.9 + Math.random() * 1.1}s`);
        p.style.setProperty('--delay', `${Math.random() * 0.36}s`);
        frag.appendChild(p);
      }
      gateParticles.appendChild(frag);
    };

    const dismissGate = () => {
      if (!gateOverlay || gateOverlay.classList.contains('dismiss')) return;
      spawnGateParticles();
      requestAnimationFrame(() => gateOverlay.classList.add('dismiss'));
      setTimeout(() => { if (gateOverlay) gateOverlay.style.display = 'none'; }, 1700);
      if (sceneEl) sceneEl.classList.add('scene-entered');
      if (window.__unlockCustomCursor) window.__unlockCustomCursor();
      if (window.__startHeavyStuffOnce) window.__startHeavyStuffOnce();
      tryAutoPlay();
      tryPlayVideo();
    };

    if (gateOverlay) {
      gateOverlay.addEventListener('click', dismissGate);
      gateOverlay.addEventListener('touchstart', dismissGate, { passive: true });
      gateOverlay.addEventListener('keydown', e => {
        if (e.code === 'Space' || e.code === 'Enter') {
          e.preventDefault();
          dismissGate();
        }
      });
      document.addEventListener('keydown', e => {
        if (e.code === 'Space') e.preventDefault();
        dismissGate();
      }, { once: true });
      if (document.fonts?.ready) {
        document.fonts.ready.then(spawnGateParticles).catch(() => spawnGateParticles());
      } else {
        requestAnimationFrame(spawnGateParticles);
      }
    }
    // Only bind unconditional autoplay helpers when the gate is not present;
    // otherwise the gate's dismissGate callback handles playback.
    if (!gateOverlay) {
      window.addEventListener('load', tryAutoPlay);
      document.addEventListener('click', tryAutoPlay, { once: true });
      document.addEventListener('touchstart', tryAutoPlay, { once: true });
      document.addEventListener('keydown', tryAutoPlay, { once: true });
      if (sceneEl) sceneEl.classList.add('scene-entered');
    }

    // ── Custom cursor (critical path; keeps first paint smooth) ──
    (function initCursor() {
      const cursorDot = document.getElementById('cursor-dot');
      const cursorRing = document.getElementById('cursor-ring');
      if (!cursorDot || !cursorRing) return;
      if (window.matchMedia('(pointer: coarse)').matches) return;

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let ringX = mouseX;
      let ringY = mouseY;
      let dotX = mouseX;
      let dotY = mouseY;
      let cursorVisible = false;
      let unlocked = false;
      let ringAnimating = false;

      window.__unlockCustomCursor = () => {
        unlocked = true;
        document.body.classList.add('cursor-enabled');
        renderDot();
        cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%,-50%)`;
        showCursor();
        if (!ringAnimating) {
          ringAnimating = true;
          requestAnimationFrame(renderRing);
        }
      };

      const renderDot = () => {
        cursorDot.style.transform = `translate3d(${dotX}px, ${dotY}px, 0) translate(-50%,-50%)`;
      };
      const renderRing = () => {
        if (!unlocked) {
          ringAnimating = false;
          return;
        }
        ringX += (mouseX - ringX) * 0.28;
        ringY += (mouseY - ringY) * 0.28;
        cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%,-50%)`;
        requestAnimationFrame(renderRing);
      };

      const showCursor = () => {
        if (cursorVisible) return;
        cursorVisible = true;
        cursorDot.style.display = 'block';
        cursorRing.style.display = 'block';
        renderDot();
      };

      document.addEventListener('mousemove', e => {
        mouseX = e.clientX; mouseY = e.clientY;
        dotX = mouseX; dotY = mouseY;
        if (!unlocked) return;
        renderDot();
        showCursor();
      }, { passive: true });

      document.addEventListener('mouseleave', () => {
        if (!unlocked) return;
        cursorDot.style.opacity = '0';
        cursorRing.style.opacity = '0';
      });
      document.addEventListener('mouseenter', () => {
        if (!unlocked) return;
        cursorDot.style.opacity = '1';
        cursorRing.style.opacity = '1';
      });

      const interactiveSelector = 'a,button,input,[tabindex],.social-btn';
      document.addEventListener('mouseover', e => {
        if (!unlocked) return;
        const t = e.target;
        if (t instanceof Element && t.closest(interactiveSelector)) {
          document.body.classList.add('cursor-hover');
        }
      });
      document.addEventListener('mouseout', e => {
        const t = e.target;
        if (!(t instanceof Element) || !t.closest(interactiveSelector)) return;
        const related = e.relatedTarget;
        if (related instanceof Element && related.closest(interactiveSelector)) return;
        document.body.classList.remove('cursor-hover');
      });
    })();

    // ════════════════════════════════════════════════
    //  HEAVY STUFF — deferred to idle time
    // ════════════════════════════════════════════════
    function initHeavyStuff() {

      // ── CRT TV noise — optimised static grain ──
      (function initNoise() {
        const cv = document.getElementById('tv-noise');
        if (!cv) return;
        const ctx = cv.getContext('2d');
        if (!ctx) return; // canvas blocked by CSP or private mode

        const lowPerf = document.documentElement.classList.contains('low-performance');
        const SCALE = lowPerf ? 7 : 4;
        const FPS = lowPerf ? 12 : 20;
        let W, H, nW, nH, imgd, d;
        const offscreen = document.createElement('canvas');
        const octx = offscreen.getContext('2d');
        if (!octx) return; // offscreen canvas context unavailable

        const resize = () => {
          W = window.innerWidth; H = window.innerHeight;
          cv.width = W; cv.height = H;
          nW = Math.ceil(W / SCALE); nH = Math.ceil(H / SCALE);
          offscreen.width = nW; offscreen.height = nH;
          imgd = octx.createImageData(nW, nH);
          d = imgd.data;
          ctx.imageSmoothingEnabled = false;
        };
        let resizeQueued = false;
        window.addEventListener('resize', () => {
          if (resizeQueued) return;
          resizeQueued = true;
          requestAnimationFrame(() => {
            resizeQueued = false;
            resize();
          });
        }, { passive: true });
        resize();

        let lastFrame = 0;
        const INTERVAL = 1000 / FPS;

        function frame(ts) {
          requestAnimationFrame(frame);
          if (document.hidden) return;
          if (ts - lastFrame < INTERVAL) return;
          lastFrame = ts;
          for (let i = 0; i < d.length; i += 4) {
            const v = (Math.random() * 255) | 0;
            d[i] = v; d[i + 1] = v; d[i + 2] = v; d[i + 3] = 255;
          }
          octx.putImageData(imgd, 0, 0);
          ctx.drawImage(offscreen, 0, 0, W, H);
        }
        requestAnimationFrame(frame);
      })();

      // ── 3D tilt helper ──
      function makeTilt(el) {
        if (!el) return;
        const isCoarse = window.matchMedia('(pointer: coarse)').matches;
        let rect = null;
        let framePending = false;
        let nextX = 0;
        let nextY = 0;
        let nextPower = 8;
        let tiltActive = false;
        const measure = () => { rect = el.getBoundingClientRect(); };
        const resetTilt = () => {
          el.classList.remove('is-tilting');
          el.classList.add('is-resetting');
          tiltActive = false;
          el.style.transform = 'rotateX(0deg) rotateY(0deg)';
          el.style.boxShadow = '';
          window.setTimeout(() => el.classList.remove('is-resetting'), 700);
        };
        const applyTilt = () => {
          framePending = false;
          if (!tiltActive) return;
          if (!rect) measure();
          const r = rect;
          const dx = (nextX - r.left - r.width / 2) / (r.width / 2);
          const dy = (nextY - r.top - r.height / 2) / (r.height / 2);
          const clampedX = Math.max(-1, Math.min(1, dx));
          const clampedY = Math.max(-1, Math.min(1, dy));
          el.style.transform = `rotateY(${clampedX * nextPower}deg) rotateX(${-clampedY * nextPower}deg)`;
          el.style.boxShadow = `${-clampedX * 14}px ${clampedY * 14}px 48px rgba(0,0,0,0.68),0 0 0 1px rgba(255,255,255,0.07),0 0 ${24 + Math.abs(clampedX) * 12}px rgba(255,255,255,0.04)`;
        };
        const scheduleTilt = (clientX, clientY, power) => {
          nextX = clientX;
          nextY = clientY;
          nextPower = power;
          if (framePending) return;
          framePending = true;
          requestAnimationFrame(applyTilt);
        };

        if (isCoarse) {
          // Mobile: pointer-drag tilt (more reliable than raw touch events)
          let dragging = false;
          let activePointerId = null;
          el.addEventListener('pointerdown', e => {
            if (e.pointerType !== 'touch' && e.pointerType !== 'pen') return;
            dragging = true;
            tiltActive = true;
            activePointerId = e.pointerId;
            el.classList.remove('is-resetting');
            el.classList.add('is-tilting');
            measure();
            try { if (el.setPointerCapture) el.setPointerCapture(e.pointerId); } catch (_) { /* pointer already released */ }
            scheduleTilt(e.clientX, e.clientY, 7);
          });
          el.addEventListener('pointermove', e => {
            if (!dragging || e.pointerId !== activePointerId) return;
            scheduleTilt(e.clientX, e.clientY, 7);
          });
          const endDrag = e => {
            if (activePointerId !== null && e.pointerId !== activePointerId) return;
            dragging = false;
            activePointerId = null;
            resetTilt();
          };
          el.addEventListener('pointerup', endDrag);
          el.addEventListener('pointercancel', endDrag);
          el.addEventListener('pointerleave', endDrag);
          return;
        }

        let on = false;
        el.addEventListener('mouseenter', () => {
          on = true;
          tiltActive = true;
          el.classList.remove('is-resetting');
          el.classList.add('is-tilting');
          measure();
        });
        el.addEventListener('mouseleave', () => { on = false; resetTilt(); });
        el.addEventListener('mousemove', e => {
          if (!on) return;
          scheduleTilt(e.clientX, e.clientY, 8);
        }, { passive: true });
        window.addEventListener('resize', () => { rect = null; }, { passive: true });
      }
      makeTilt(document.getElementById('card'));
      makeTilt(document.getElementById('player'));

      // ── Discord status (Lanyard API) ──
      // 1. Replace DISCORD_ID with your numeric Discord user ID
      // 2. Join the Lanyard server: discord.gg/lanyard
      const DISCORD_ID = '1116705555461984298'; // ← change this
      let activityTimer = null;

      const statusLabel = { online: 'Online', idle: 'Idle', dnd: 'Do Not Disturb', offline: 'Invisible' };
      const setStatusLine = text => {
        const el = document.getElementById('dc-status-text');
        if (el) el.textContent = text || '';
      };

      const fmtElapsed = ms => {
        const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60);
        return h > 0
          ? `${h}:${String(m % 60).padStart(2, '0')}:${String(s % 60).padStart(2, '0')} elapsed`
          : `${m}:${String(s % 60).padStart(2, '0')} elapsed`;
      };

      const startElapsed = startTs => {
        clearInterval(activityTimer);
        activityTimer = setInterval(() => {
          const el = document.getElementById('dc-act-elapsed');
          if (el) el.textContent = fmtElapsed(Date.now() - startTs);
        }, 1000);
      };

      async function loadDiscord() {
        if (DISCORD_ID === 'YOUR_DISCORD_USER_ID') {
          document.getElementById('dc-username').textContent = 'Set your Discord ID';
          setStatusLine('See HTML script section');
          return;
        }
        try {
          const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
          const j = await res.json();
          if (!j.success) throw 0;
          const d = j.data, u = d.discord_user;

          // Avatar
          if (u.avatar) {
            const ext = u.avatar.startsWith('a_') ? 'gif' : 'png';
            document.getElementById('dc-avatar').innerHTML =
              `<img src="https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=80" alt="">`;
          }

          // Username / tag
          document.getElementById('dc-username').textContent = u.global_name || u.username;
          document.getElementById('dc-tag').textContent =
            u.discriminator && u.discriminator !== '0'
              ? `@${u.username}#${u.discriminator}`
              : `@${u.username}`;

          // Status dot
          document.getElementById('dc-dot').className = 'dc-dot ' + (d.discord_status || 'offline');

          // Custom status (type 4)
          const customAct = d.activities?.find(a => a.type === 4);
          setStatusLine(customAct ? customAct.state || statusLabel[d.discord_status] || '' : statusLabel[d.discord_status] || 'Invisible');

          // Rich activity (type 0 = game/app, type 2 = music)
          const act = d.activities?.find(a => a.type === 0 || a.type === 2);
          const rowEl = document.getElementById('dc-activity-row');
          clearInterval(activityTimer);

          if (act) {
            rowEl.style.display = 'flex';
            rowEl.classList.remove('is-idle');
            const typeMap = { 0: 'Playing', 2: 'Listening to', 3: 'Watching', 5: 'Competing in' };
            document.getElementById('dc-act-label').textContent = typeMap[act.type] || 'Playing';
            document.getElementById('dc-act-name').textContent = act.name || '';
            document.getElementById('dc-act-detail').textContent = [act.details, act.state].filter(Boolean).join(' · ');

            const imgWrap = document.getElementById('dc-act-img');
            const appId = act.application_id;
            if (act.assets?.large_image) {
              let src = act.assets.large_image;
              src = src.startsWith('mp:external/')
                ? 'https://media.discordapp.net/' + src.replace('mp:', '')
                : appId ? `https://cdn.discordapp.com/app-assets/${appId}/${src}.png` : src;
              imgWrap.innerHTML = `<img src="${src}" alt=""><div class="dc-act-img-small" id="dc-act-img-small"></div>`;
              if (act.assets?.small_image) {
                let sm = act.assets.small_image;
                sm = sm.startsWith('mp:external/')
                  ? 'https://media.discordapp.net/' + sm.replace('mp:', '')
                  : appId ? `https://cdn.discordapp.com/app-assets/${appId}/${sm}.png` : sm;
                const small = imgWrap.querySelector('.dc-act-img-small');
                small.innerHTML = `<img src="${sm}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
                small.style.display = 'block';
              }
            } else if (appId) {
              imgWrap.innerHTML = `<img src="https://cdn.discordapp.com/app-icons/${appId}/icon.png" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:6px;">`;
            } else {
              imgWrap.innerHTML = '';
            }

            if (act.timestamps?.start) {
              startElapsed(act.timestamps.start);
              document.getElementById('dc-act-elapsed').textContent = fmtElapsed(Date.now() - act.timestamps.start);
            } else {
              document.getElementById('dc-act-elapsed').textContent = '';
            }
          } else {
            rowEl.style.display = 'flex';
            rowEl.classList.add('is-idle');
            document.getElementById('dc-act-label').textContent = '';
            document.getElementById('dc-act-name').textContent = '目前沒有在忙什麼～';
            document.getElementById('dc-act-detail').textContent = '';
            document.getElementById('dc-act-elapsed').textContent = '';
            document.getElementById('dc-act-img').innerHTML =
              '<span class="dc-act-idle-icon material-symbols-outlined" aria-hidden="true">coffee</span>';
          }
        } catch (e) {
          document.getElementById('dc-username').textContent = 'Discord';
          setStatusLine('Status unavailable');
        }
      }
      loadDiscord();
      setInterval(loadDiscord, 30000);

      // ── Config (fonts + socials) ──
      const DEFAULT_CONFIG = {
        fonts: {
          googleCssUrl: 'https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Covered+By+Your+Grace&family=Noto+Serif+HK:wght@400;500;700&display=swap',
          body: "'Noto Serif HK', serif",
          name: "'Chiron GoRound TC', sans-serif",
          overlay: "'Covered By Your Grace', cursive"
        },
        socials: [
          { label: 'Discord', href: 'https://discord.com/users/1116705555461984298', newTab: true, icon: { type: 'svg', viewBox: '0 0 24 24', path: 'M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026 13.83 13.83 0 0 0 1.226-1.963.074.074 0 0 0-.041-.104 13.175 13.175 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z' } },
          { label: 'Instagram', href: 'https://instagram.com/fn.rip', newTab: true, icon: { type: 'svg', viewBox: '0 0 24 24', path: 'M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z' } },
          { label: 'BlueSky', href: 'https://bsky.app/profile/tcfsh.me', newTab: true, icon: { type: 'svg', viewBox: '0 0 24 24', path: 'M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566 1.213 1.462 1.59 1.07 3.52c-.46 2.302.724 5.814 1.756 7.502 2.074 3.462 5.885 6.016 10.174 5.978 4.29.038 8.1-2.516 10.174-5.978 1.032-1.688 2.216-5.2 1.756-7.502-.392-1.93-1.496-2.307-4.132-.715C16.046 4.747 13.087 8.686 12 10.8z' } },
          { label: 'YouTube', href: 'https://youtube.com/channel/UCBDTlPfx28ociCnZiIKDS7w?si=8GnwxZuxQjTx_-1G', newTab: true, icon: { type: 'svg', viewBox: '0 0 24 24', path: 'M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z' } },
          { label: 'Email', href: 'mailto:fntw@duck.com', icon: { type: 'ms', name: 'mail' } }
        ]
      };

      const applyConfig = cfg => {
        if (!cfg) return;
        const fonts = cfg.fonts || {};
        if (fonts.body) document.documentElement.style.setProperty('--font-body', fonts.body);
        if (fonts.name) document.documentElement.style.setProperty('--font-name', fonts.name);
        if (fonts.overlay) document.documentElement.style.setProperty('--font-overlay', fonts.overlay);
        if (fonts.googleCssUrl) {
          let link = document.getElementById('font-config');
          if (!link) { link = document.createElement('link'); link.id = 'font-config'; link.rel = 'stylesheet'; document.head.appendChild(link); }
          link.href = fonts.googleCssUrl;
        }
        renderSocials(cfg.socials || DEFAULT_CONFIG.socials);
      };

      const renderSocials = list => {
        const container = document.getElementById('socials');
        if (!container) return;
        container.innerHTML = '';
        const frag = document.createDocumentFragment();
        (list || []).forEach(item => {
          const a = document.createElement('a');
          a.className = 'social-btn';
          a.href = item.href || '#';
          a.title = item.label || '';
          a.setAttribute('aria-label', item.label || '');
          if (item.newTab) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
          if (item.icon) {
            if (item.icon.type === 'svg' && item.icon.path) {
              const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
              svg.setAttribute('viewBox', item.icon.viewBox || '0 0 24 24');
              const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
              path.setAttribute('d', item.icon.path);
              svg.appendChild(path); a.appendChild(svg);
            } else if (item.icon.type === 'img' && item.icon.src) {
              const img = document.createElement('img'); img.src = item.icon.src; img.alt = item.label || ''; a.appendChild(img);
            } else if (item.icon.type === 'ms' && item.icon.name) {
              const span = document.createElement('span'); span.className = 'material-symbols-outlined'; span.textContent = item.icon.name; a.appendChild(span);
            }
          } else {
            a.textContent = item.label || '';
          }
          frag.appendChild(a);
        });
        container.appendChild(frag);
      };

      applyConfig(DEFAULT_CONFIG);
      fetch('config.json')
        .then(r => r.ok ? r.json() : Promise.reject(r.status))
        .then(cfg => applyConfig({
          fonts: { ...DEFAULT_CONFIG.fonts, ...(cfg.fonts || {}) },
          socials: cfg.socials || DEFAULT_CONFIG.socials
        }))
        .catch(() => { });

      // ── URL hash waveform animation ──
      // Keep the effect, but run at a lower frequency to reduce overhead.
      (function initHashWave() {
        const wave = '▁▂▃▅▆▇▆▅▃▂▁▂▃▅▆▇▆▅▃▂';
        let offset = 0;

        let speed = 120; // base speed

        function loop() {
          if (document.hidden) {
            setTimeout(loop, 500);
            return;
          }

          offset = (offset + 1) % wave.length;

          const rotated =
            wave.slice(offset) + wave.slice(0, offset);

          history.replaceState(null, '', '#' + rotated);

          // Add a subtle "breathing" speed variation for a more organic feel
          speed = 90 + Math.sin(performance.now() / 400) * 40;

          setTimeout(loop, speed);
        }

        setTimeout(loop, speed);
      })();

      // ── Title typing effect ──
      (function initTyping() {
        const text = "Farmernet's website";
        const caret = "|";

        let index = 0;
        let mode = "typing"; // typing / deleting / pause

        let speed = 67; // typing speed

        let caretVisible = true;

        function tickCaret() {
          caretVisible = !caretVisible;
          setTimeout(tickCaret, document.hidden ? 1000 : 500);
        }

        function loop() {
          if (document.hidden) {
            setTimeout(loop, 1000);
            return;
          }

          if (mode === "typing") {
            index++;
            if (index >= text.length) {
              mode = "pause";
              speed = 2400; // pause briefly
            }
          } else if (mode === "deleting") {
            index--;
            if (index <= 0) {
              mode = "typing";
              speed = 40;
            }
          } else if (mode === "pause") {
            mode = "deleting";
            speed = 50; // delete a bit faster
          }

          document.title =
            text.slice(0, index) + (caretVisible ? caret : " ");

          setTimeout(loop, speed);
        }

        setTimeout(tickCaret, 500);
        setTimeout(loop, speed);
      })();
    } // end initHeavyStuff

    // Kick off heavy stuff only after gate dismisses (or immediately when no gate).
    let heavyStarted = false;
    window.__startHeavyStuffOnce = () => {
      if (heavyStarted) return;
      heavyStarted = true;
      onIdle(initHeavyStuff);
    };
    if (!gateOverlay) window.__startHeavyStuffOnce();
  </script>
