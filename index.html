<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Farmernet's website</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cactus+Classical+Serif&family=LXGW+WenKai+TC&family=Splash&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --w04:  rgba(255,255,255,0.04);
  --w08:  rgba(255,255,255,0.08);
  --w15:  rgba(255,255,255,0.15);
  --w25:  rgba(255,255,255,0.25);
  --w50:  rgba(255,255,255,0.50);
  --w70:  rgba(255,255,255,0.70);
  --font-body: 'LXGW WenKai TC', serif;
  --font-name: 'Cactus Classical Serif', 'LXGW WenKai TC', serif;
  --font-overlay: 'Splash', cursive;
}

html, body {
  width: 100%; min-height: 100%;
  overflow-x: hidden;
  background: #000;
  font-family: var(--font-body);
  color: #fff;
}
* { cursor: none; }

/* ── Cursor: grey semi-transparent blob + lagging ring ── */
.cursor-dot {
  position: fixed; left: 0; top: 0;
  width: 22px; height: 22px; border-radius: 50%;
  background: rgba(200,200,210,0.28);
  backdrop-filter: blur(2px);
  transform: translate(-50%,-50%);
  pointer-events: none; z-index: 2001;
  display: none;
  transition: width .15s ease, height .15s ease, opacity .2s ease, background .2s ease;
}
.cursor-ring {
  position: fixed; left: 0; top: 0;
  width: 42px; height: 42px; border-radius: 50%;
  border: 1px solid rgba(200,200,210,0.30);
  transform: translate(-50%,-50%);
  pointer-events: none; z-index: 2000;
  display: none;
  transition: width .18s ease, height .18s ease, border-color .18s ease, opacity .2s ease;
}
body.cursor-hover .cursor-dot  { width: 28px; height: 28px; background: rgba(200,200,210,0.38); }
body.cursor-hover .cursor-ring { width: 56px; height: 56px; border-color: rgba(200,200,210,0.50); }

/* ????????????????????????????????????????
   GATE OVERLAY
???????????????????????????????????????? */
.gate-overlay {
  position: fixed; inset: 0; z-index: 999;
  display: flex; align-items: center; justify-content: center;
  background:
    radial-gradient(ellipse 70% 50% at 50% 45%, rgba(255,255,255,0.08), transparent 60%),
    rgba(0,0,0,0.78);
  backdrop-filter: blur(8px) saturate(1.1);
  -webkit-backdrop-filter: blur(8px) saturate(1.1);
  transition: none;
  cursor: pointer;
  user-select: none;
  overflow: hidden;
  will-change: opacity;
  transform: translateZ(0);
}
.gate-overlay.dismiss {
  pointer-events: none;
  animation: gate-fade 1.6s ease forwards;
}
.gate-overlay::before,
.gate-overlay::after {
  content: '';
  position: absolute; inset: -20%;
  background:
    radial-gradient(circle at 30% 40%, rgba(255,255,255,0.08), transparent 55%),
    radial-gradient(circle at 70% 55%, rgba(255,255,255,0.06), transparent 60%),
    radial-gradient(circle at 50% 20%, rgba(255,255,255,0.05), transparent 50%);
  opacity: 0.55;
  filter: blur(12px);
  transform: scale(1.08);
  transition: opacity 1.2s ease, transform 1.2s ease;
  mix-blend-mode: screen;
  z-index: 1;
}
.gate-overlay::after {
  opacity: 0.42;
  filter: blur(18px);
  transform: scale(1.12);
}
.gate-overlay.dismiss::before,
.gate-overlay.dismiss::after {
  opacity: 0;
  transform: scale(1.6);
}
.gate-text {
  font-family: var(--font-overlay);
  font-size: clamp(34px, 6vw, 72px);
  letter-spacing: 0.03em;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 8px 30px rgba(0,0,0,0.65), 0 0 24px rgba(255,255,255,0.20);
  padding: 10px 16px;
  transition: opacity 0.8s ease, transform 0.8s ease;
  position: relative;
  z-index: 3;
  animation: gate-breathe 3.2s ease-in-out infinite;
}
.gate-overlay.dismiss .gate-text {
  opacity: 0;
  transform: translateY(-10px) scale(1.06);
}
.gate-particles {
  position: absolute; inset: 0; pointer-events: none; z-index: 4;
}
.gate-particle {
  position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(255,255,255,0.25) 55%, transparent 72%);
  opacity: 0;
  transform: translate(0,0) scale(0.7);
  will-change: transform, opacity;
}
.gate-overlay.dismiss .gate-particle {
  animation: fog-drift var(--dur,1s) ease-out forwards;
  animation-delay: var(--delay,0s);
}
@keyframes fog-drift {
  0%   { opacity: 0.25; transform: translate(0,0) scale(0.7); }
  10%  { opacity: 0.95; }
  100% { opacity: 0; transform: translate(var(--dx,0), var(--dy,0)) scale(2.3); }
}
@keyframes gate-breathe {
  0%,100% { text-shadow: 0 8px 30px rgba(0,0,0,0.65), 0 0 18px rgba(255,255,255,0.18); }
  50% { text-shadow: 0 8px 30px rgba(0,0,0,0.65), 0 0 36px rgba(255,255,255,0.45); }
}
@keyframes gate-fade {
  0%   { opacity: 1; visibility: visible; }
  55%  { opacity: 1; }
  100% { opacity: 0; visibility: hidden; }
}

/* ────────────────────────────────────────
   OLD TV SCREEN SIMULATION
──────────────────────────────────────── */

/* ── The TV screen itself — full viewport, no bezel frame ── */
.tv-screen {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

/* Screen reflection — convex glass highlight */
.tv-screen::before {
  content: ''; position: absolute; inset: 0; z-index: 20; pointer-events: none;
  background:
    radial-gradient(ellipse 55% 40% at 46% 28%,
      rgba(255,255,255,0.030) 0%,
      transparent 65%),
    radial-gradient(ellipse 100% 100% at 50% 50%,
      transparent 40%,
      rgba(0,0,0,0.38) 80%,
      rgba(0,0,0,0.72) 100%);
}

/* Phosphor dot grid — the dense TV pixel dots */
.tv-screen::after {
  content: ''; position: absolute; inset: 0; z-index: 10; pointer-events: none;
  background-image:
    radial-gradient(circle, rgba(0,0,0,0.55) 1px, transparent 1px);
  background-size: 3px 3px;
}

/* Video — clear and bright inside the screen */
#bg-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
  filter: brightness(0.90) saturate(0.72) contrast(1.08);
  /* Slight horizontal scale to simulate barrel stretch */
  transform: scale(1.04);
}

/* CRT scanlines — fine and light, don't kill brightness */
.scanlines {
  position: absolute; inset: 0; z-index: 11; pointer-events: none;
  background: repeating-linear-gradient(to bottom,
    transparent 0px, transparent 3px,
    rgba(0,0,0,0.10) 3px, rgba(0,0,0,0.10) 4px);
  border-radius: inherit;
}

/* Static noise canvas */
#tv-noise {
  position: absolute; inset: 0; z-index: 12; pointer-events: none;
  opacity: 0.032; mix-blend-mode: screen; border-radius: inherit;
}

/* Screen flicker */
.crt-flicker {
  position: absolute; inset: 0; z-index: 13; pointer-events: none;
  animation: flicker 0.14s steps(1) infinite;
  border-radius: inherit;
}
@keyframes flicker {
  0%,50%,100% { background: transparent; opacity: 1; }
  25%  { background: rgba(255,255,255,0.007); }
  75%  { opacity: 0.97; }
}

/* Horizontal scan roll */
.crt-roll {
  position: absolute; left: 0; right: 0; z-index: 14; pointer-events: none;
  height: 4px;
  background: linear-gradient(to right,
    transparent, rgba(255,255,255,0.07) 30%,
    rgba(255,255,255,0.12) 55%, transparent);
  animation: roll 16s linear infinite;
}
@keyframes roll {
  0%   { top: -6px; }
  100% { top: 100%; }
}

/* ────────────────────────────────────────
   SCENE  — vertical stack like 1024
──────────────────────────────────────── */
#scene {
  position: relative; z-index: 10;
  width: 100%; min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 20px;
  gap: 14px;
  perspective: 900px;
}

/* ────────────────────────────────────────
   CARD  — more transparent, stronger blur
──────────────────────────────────────── */
.card {
  width: 380px;
  background: rgba(4, 4, 8, 0.12);
  backdrop-filter: blur(24px) saturate(1.2) brightness(0.82);
  -webkit-backdrop-filter: blur(24px) saturate(1.2) brightness(0.82);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 18px;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.5s ease, box-shadow 0.4s ease;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 28px 70px rgba(0,0,0,0.70),
    0 0 40px rgba(0,0,0,0.3);
  position: relative;
}
/* noise grain */
.card::before {
  content: ''; position: absolute; inset: 0; z-index: 0;
  pointer-events: none; border-radius: 18px;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.04;
}
/* phosphor afterglow on card edge */
.card::after {
  content: ''; position: absolute; inset: 0; z-index: 0;
  pointer-events: none; border-radius: 18px;
  box-shadow: inset 0 0 28px rgba(140,255,100,0.022),
              inset 0 0 60px rgba(100,200,80,0.012);
}
/* spinning border glow on hover */
.card-glow {
  position: absolute; inset: -1px; z-index: 0;
  border-radius: 18px; pointer-events: none; padding: 1px;
  background: conic-gradient(from var(--angle,0deg),
    transparent 0deg, rgba(255,255,255,0.18) 60deg, transparent 120deg);
  opacity: 0; transition: opacity 0.5s;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
.card:hover .card-glow { opacity: 1; animation: glow-spin 3s linear infinite; }
@property --angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
@keyframes glow-spin { to { --angle: 360deg; } }

/* ────────────────────────────────────────
   AVATAR  — top of card, no banner
──────────────────────────────────────── */
.avatar-row {
  display: flex; justify-content: center;
  padding-top: 28px;
  position: relative; z-index: 5;
}
.avatar-ring {
  width: 88px; height: 88px; border-radius: 50%;
  padding: 0;
  background: none;
  box-shadow: 0 6px 26px rgba(0,0,0,0.5);
  transition: box-shadow 0.4s;
}
.card:hover .avatar-ring {
  box-shadow: 0 6px 26px rgba(0,0,0,0.6), 0 0 28px rgba(255,255,255,0.08);
}
.avatar-ring img {
  width: 100%; height: 100%; border-radius: 50%;
  object-fit: cover; display: block;
  border: none;
}

/* ────────────────────────────────────────
   CARD BODY
──────────────────────────────────────── */
.card-body {
  padding: 14px 22px 22px;
  display: flex; flex-direction: column; align-items: center;
  gap: 13px; position: relative; z-index: 1;
}

/* ────────────────────────────────────────
   NAME  (glitch)
──────────────────────────────────────── */
.name {
  font-family: var(--font-name);
  font-size: 2.15rem;
  line-height: 1.05;
  letter-spacing: 0.06em;
  text-align: center;
  position: relative;
  display: inline-block;
  user-select: none;
  font-weight: 400;
  color: #fff;
  text-shadow:
    -1px -1px 0 #fff,
    1px 1px 0 #000,
    2px 2px 0 #000,
    3px 3px 0 #000,
    4px 4px 0 #000,
    5px 5px 0 #000;
}
.name::before {
  content: '';
}
.name::after {
  content: '';
}

/* ────────────────────────────────────────
   DIVIDER
──────────────────────────────────────── */
.divider {
  width: 100%; height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.10), transparent);
}

/* ────────────────────────────────────────
   BIO
──────────────────────────────────────── */
.bio {
  font-size: 12px; color: var(--w50);
  text-align: center; line-height: 1.85;
  letter-spacing: 0.03em; max-width: 290px;
}

/* ────────────────────────────────────────
   DISCORD STATUS  —  no blue, white/grey
──────────────────────────────────────── */
.discord-box {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 12px;
  overflow: hidden;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.discord-box:hover {
  border-color: rgba(255,255,255,0.18);
  box-shadow: 0 0 22px rgba(255,255,255,0.04);
}

/* top row: avatar + name + status dot */
.dc-top {
  display: flex; align-items: center; gap: 11px;
  padding: 11px 13px 9px;
}
.dc-av-wrap { position: relative; flex-shrink: 0; }
.dc-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  position: relative; z-index: 1;
}
.dc-avatar-deco {
  position: absolute; left: -4px; top: -4px;
  width: 48px; height: 48px;
  z-index: 2;
  pointer-events: none;
  object-fit: contain;
  filter: drop-shadow(0 0 6px rgba(0,0,0,0.4));
}
.dc-avatar img { width:100%; height:100%; border-radius:50%; object-fit:cover; }
.dc-avatar svg { width:20px; height:20px; fill:rgba(255,255,255,0.5); }
.dc-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: none;
  position: absolute; bottom: -1px; right: -1px;
  background: transparent; transition: opacity 0.2s;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  z-index: 3;
}
.dc-dot.online  { background-image: url("online.webp"); }
.dc-dot.dnd     { background-image: url("dnd.webp"); }
.dc-dot.offline { background-image: url("invisible.webp"), url("offline.webp"); }
.dc-dot.idle    { background-image: url("online.webp"); opacity: 0.7; }
.dc-head { flex: 1; min-width: 0; }
.dc-identity { display:flex; align-items:center; gap:8px; min-width:0; flex-wrap:nowrap; }
.dc-server-tag {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 2px 6px 2px 4px;
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 7px;
  font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
  color: rgba(255,255,255,0.85);
  background: rgba(0,0,0,0.35);
  white-space: nowrap; line-height: 1;
}
.dc-server-icon {
  width: 12px; height: 12px; display:block;
}
.dc-badges {
  display:flex; align-items:center; gap:4px;
}
.dc-badge-icon {
  width: 16px; height: 16px; display:block;
  filter: drop-shadow(0 0 4px rgba(0,0,0,0.5));
}
.dc-username {
  font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.92);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: 0.01em;
  max-width: 120px;
}
.dc-tag {
  font-size: 10px; color: var(--w25); letter-spacing: 0.04em; margin-top: 1px;
}
.dc-status-text {
  font-size: 10.5px; color: var(--w50); letter-spacing: 0.02em;
  margin-top: 2px; display: flex; align-items: center; gap: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* activity row */
.dc-activity-row {
  display: none; /* shown via JS when activity exists */
  align-items: center; gap: 10px;
  padding: 8px 13px 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.18);
}
.dc-act-img {
  width: 42px; height: 42px; border-radius: 7px; flex-shrink: 0;
  background: rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.08);
  position: relative;
}
.dc-act-img img { width:100%; height:100%; object-fit:cover; border-radius:6px; }
.dc-act-img-small {
  width: 17px; height: 17px; border-radius: 50%;
  position: absolute; bottom: -4px; right: -4px;
  border: 1.5px solid rgba(6,6,10,0.95);
  background: rgba(255,255,255,0.07); overflow: hidden;
}
.dc-act-img-small img { width:100%; height:100%; object-fit:cover; }
.dc-act-info { flex:1; min-width:0; }
.dc-act-label {
  font-size: 9px; color: var(--w25); text-transform: uppercase;
  letter-spacing: 0.16em; margin-bottom: 2px;
}
.dc-act-name {
  font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.82);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.dc-act-detail {
  font-size: 10px; color: var(--w50);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.dc-act-elapsed {
  font-size: 9.5px; color: var(--w25); margin-top: 2px;
  letter-spacing: 0.02em;
}

/* ────────────────────────────────────────
   SOCIAL BUTTONS  —  icon only, no box
──────────────────────────────────────── */
.socials {
  display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;
  padding: 2px 0;
}
.social-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  color: var(--w25); text-decoration: none;
  background: none; border: none;
  transition: color 0.22s ease, transform 0.22s ease, filter 0.22s ease;
  cursor: pointer;
}
.social-btn:hover {
  color: rgba(255,255,255,0.95);
  transform: translateY(-4px) scale(1.20);
  filter: drop-shadow(0 0 8px rgba(255,255,255,0.55));
}
.social-btn .material-symbols-outlined {
  font-variation-settings:'FILL' 0,'wght' 200,'GRAD' 0,'opsz' 24;
  font-size: 26px;
}
.social-btn svg { width: 24px; height: 24px; fill: currentColor; }
.social-btn img { width: 24px; height: 24px; display: block; }

/* ────────────────────────────────────────
   MUSIC PLAYER  — modern horizontal rectangle
──────────────────────────────────────── */
.player {
  width: 380px;
  background: rgba(4, 4, 8, 0.12);
  backdrop-filter: blur(24px) saturate(1.2) brightness(0.82);
  -webkit-backdrop-filter: blur(24px) saturate(1.2) brightness(0.82);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 16px;
  overflow: hidden;
  transform-style: preserve-3d;
  transition: transform 0.5s ease, box-shadow 0.4s ease;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 28px 70px rgba(0,0,0,0.60),
    0 0 40px rgba(0,0,0,0.2);
  position: relative; z-index: 10;
}
/* noise grain */
.player::before {
  content: ''; position: absolute; inset: 0; z-index: 0;
  pointer-events: none; border-radius: 16px;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.04;
}
/* spinning border glow on hover */
.player-glow {
  position: absolute; inset: -1px; z-index: 0;
  border-radius: 16px; pointer-events: none; padding: 1px;
  background: conic-gradient(from var(--player-angle,0deg),
    transparent 0deg, rgba(255,255,255,0.18) 60deg, transparent 120deg);
  opacity: 0; transition: opacity 0.5s;
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
}
@property --player-angle { syntax:'<angle>'; initial-value:0deg; inherits:false; }
.player:hover .player-glow { opacity: 1; animation: player-glow-spin 3s linear infinite; }
@keyframes player-glow-spin { to { --player-angle: 360deg; } }

/* ── horizontal layout: album art left, info+controls right ── */
.player-vinyl-row { display: none; } /* hide old vinyl row */

.player-body {
  display: flex; flex-direction: row; align-items: center;
  padding: 16px 18px; gap: 16px;
  position: relative; z-index: 1;
}

/* Album art square */
.player-album-art {
  flex-shrink: 0;
  width: 72px; height: 72px;
  border-radius: 10px;
  background: #111;
  border: 1px solid rgba(255,255,255,0.10);
  box-shadow: 0 4px 18px rgba(0,0,0,0.6);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
/* Album cover image */
.album-cover-img {
  position: absolute; inset: 0; z-index: 3;
  width: 100%; height: 100%; object-fit: cover; border-radius: 10px;
  display: block;
}
.album-cover-img.hidden { display: none; }
.vinyl {
  width: 72px; height: 72px; border-radius: 10px;
  background:
    linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 50%, #1e1e1e 100%);
  display: flex; align-items: center; justify-content: center;
  animation: spin 6s linear infinite; animation-play-state: paused;
  position: relative;
}
.vinyl::before {
  content: '';
  position: absolute; inset: 0; border-radius: 10px;
  background: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 3px,
    rgba(255,255,255,0.015) 3px,
    rgba(255,255,255,0.015) 6px
  );
}
.vinyl::after {
  content: ''; width: 18px; height: 18px; border-radius: 50%;
  background: radial-gradient(circle, #1a1a1a 0%, #0d0d0d 100%);
  border: 1.5px solid rgba(255,255,255,0.12);

// ══════════════════════════════════════════════
//  CRT TV NOISE  — optimized static grain
// ══════════════════════════════════════════════
(function(){
  const cv = document.getElementById('tv-noise');
  const ctx = cv.getContext('2d');
  // Use a small noise canvas scaled up — far fewer pixels to randomise
  const SCALE = 4;
  let W, H, nW, nH;
  const offscreen = document.createElement('canvas');
  const octx = offscreen.getContext('2d');

  const resize = () => {
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W; cv.height = H;
    nW = Math.ceil(W / SCALE); nH = Math.ceil(H / SCALE);
    offscreen.width = nW; offscreen.height = nH;
    ctx.imageSmoothingEnabled = false;
  };
  window.addEventListener('resize', resize); resize();

  // Pre-allocate once
  let id = octx.createImageData(1, 1); // placeholder, recreated after resize
  let lastFrame = 0;
  const FPS = 20;
  const INTERVAL = 1000 / FPS;

  function frame(ts) {
    requestAnimationFrame(frame);
    if (ts - lastFrame < INTERVAL) return;
    lastFrame = ts;
    const imgd = octx.createImageData(nW, nH);
    const d = imgd.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = (Math.random() * 255) | 0;
      d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
    }
    octx.putImageData(imgd, 0, 0);
    ctx.drawImage(offscreen, 0, 0, W, H);
  }
  requestAnimationFrame(frame);
})();

// ══════════════════════════════════════════════
//  3D TILT — CARD
// ══════════════════════════════════════════════
const card=document.getElementById('card');
let tiltOn=false;
card.addEventListener('mouseenter',()=>{tiltOn=true;card.style.transition='transform 0.08s ease-out,box-shadow 0.4s ease';});
card.addEventListener('mouseleave',()=>{tiltOn=false;card.style.transition='transform 0.5s ease,box-shadow 0.4s ease';card.style.transform='rotateX(0)rotateY(0)';card.style.boxShadow='';});
card.addEventListener('mousemove',e=>{
  if(!tiltOn)return;
  const r=card.getBoundingClientRect();
  const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
  const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
  card.style.transform=`rotateY(${dx*8}deg) rotateX(${-dy*8}deg)`;
  card.style.boxShadow=`${-dx*16}px ${dy*16}px 55px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.07),0 0 ${28+Math.abs(dx)*16}px rgba(255,255,255,0.05)`;
});

// ══════════════════════════════════════════════
//  3D TILT — PLAYER (same logic as card)
// ══════════════════════════════════════════════
const player=document.getElementById('player');
let playerTiltOn=false;
player.addEventListener('mouseenter',()=>{playerTiltOn=true;player.style.transition='transform 0.08s ease-out,box-shadow 0.4s ease';});
player.addEventListener('mouseleave',()=>{playerTiltOn=false;player.style.transition='transform 0.5s ease,box-shadow 0.4s ease';player.style.transform='rotateX(0)rotateY(0)';player.style.boxShadow='';});
player.addEventListener('mousemove',e=>{
  if(!playerTiltOn)return;
  const r=player.getBoundingClientRect();
  const dx=(e.clientX-r.left-r.width/2)/(r.width/2);
  const dy=(e.clientY-r.top-r.height/2)/(r.height/2);
  player.style.transform=`rotateY(${dx*8}deg) rotateX(${-dy*8}deg)`;
  player.style.boxShadow=`${-dx*16}px ${dy*16}px 55px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.07),0 0 ${28+Math.abs(dx)*16}px rgba(255,255,255,0.05)`;
});

// ══════════════════════════════════════════════
//  DISCORD STATUS  (Lanyard API)
//
//  ① 將 DISCORD_ID 換成你的 Discord 數字 ID
//  ② 加入 Lanyard 伺服器：discord.gg/lanyard
// ══════════════════════════════════════════════
const DISCORD_ID = '1116705555461984298'; // ← 改這裡

let activityTimer = null;

const statusLabel = { online:'Online', idle:'Idle', dnd:'Do Not Disturb', offline:'Invisible' };
const setStatusLine=(text)=>{
  const stEl=document.getElementById('dc-status-text');
  if(stEl) stEl.textContent=text||'';
};

function fmtElapsed(ms){
  const s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  if(h>0) return `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')} elapsed`;
  return `${m}:${String(s%60).padStart(2,'0')} elapsed`;
}

function startElapsed(startTs){
  clearInterval(activityTimer);
  activityTimer=setInterval(()=>{
    const el=document.getElementById('dc-act-elapsed');
    if(el) el.textContent=fmtElapsed(Date.now()-startTs);
  },1000);
}

async function loadDiscord(){
  if(DISCORD_ID==='YOUR_DISCORD_USER_ID'){
    document.getElementById('dc-username').textContent='Set your Discord ID';
    setStatusLine('See HTML script section');
    return;
  }
  try{
    const res=await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
    const j=await res.json();
    if(!j.success) throw 0;
    const d=j.data,u=d.discord_user;

    // ── avatar ──
    if(u.avatar){
      const ext=u.avatar.startsWith('a_')?'gif':'png';
      const av=document.getElementById('dc-avatar');
      av.innerHTML=`<img src="https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=80" alt="">`;
    }

    // ── username / tag ──
    document.getElementById('dc-username').textContent=u.global_name||u.username;
    document.getElementById('dc-tag').textContent=
      u.discriminator&&u.discriminator!=='0' ? `@${u.username}#${u.discriminator}` : `@${u.username}`;

    // ── status dot ──
    document.getElementById('dc-dot').className='dc-dot '+(d.discord_status||'offline');

    // ── custom status (type 4) ──
    const customAct=d.activities?.find(a=>a.type===4);
    if(customAct){
      setStatusLine(customAct.state||statusLabel[d.discord_status]||'');
    } else {
      setStatusLine(statusLabel[d.discord_status]||'Invisible');
    }

    // ── rich activity (type 0 = game/app) ──
    const act=d.activities?.find(a=>a.type===0||a.type===2);
    const rowEl=document.getElementById('dc-activity-row');
    clearInterval(activityTimer);

    if(act){
      rowEl.style.display='flex';

      // label
      const typeMap={0:'Playing',2:'Listening to',3:'Watching',5:'Competing in'};
      document.getElementById('dc-act-label').textContent=typeMap[act.type]||'Playing';

      // name
      document.getElementById('dc-act-name').textContent=act.name||'';

      // detail / state
      const parts=[act.details,act.state].filter(Boolean);
      document.getElementById('dc-act-detail').textContent=parts.join(' · ');

      // large image
      const imgWrap=document.getElementById('dc-act-img');
      const appId=act.application_id;
      if(act.assets?.large_image){
        let src=act.assets.large_image;
        if(src.startsWith('mp:external/')){
          src='https://media.discordapp.net/'+src.replace('mp:','');
        } else if(appId){
          src=`https://cdn.discordapp.com/app-assets/${appId}/${src}.png`;
        }
        imgWrap.innerHTML=`<img src="${src}" alt=""><div class="dc-act-img-small" id="dc-act-img-small"></div>`;
        // small image
        if(act.assets?.small_image){
          let sm=act.assets.small_image;
          if(sm.startsWith('mp:external/')){
            sm='https://media.discordapp.net/'+sm.replace('mp:','');
          } else if(appId){
            sm=`https://cdn.discordapp.com/app-assets/${appId}/${sm}.png`;
          }
          imgWrap.querySelector('.dc-act-img-small').innerHTML=`<img src="${sm}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
          imgWrap.querySelector('.dc-act-img-small').style.display='block';
        }
      } else if(appId){
        imgWrap.innerHTML=`<img src="https://cdn.discordapp.com/app-icons/${appId}/icon.png" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:6px;">`;
      } else {
        imgWrap.innerHTML='';
      }

      // elapsed timer
      if(act.timestamps?.start){
        startElapsed(act.timestamps.start);
        document.getElementById('dc-act-elapsed').textContent=fmtElapsed(Date.now()-act.timestamps.start);
      } else {
        document.getElementById('dc-act-elapsed').textContent='';
      }

    } else {
      rowEl.style.display='none';
    }

  }catch(e){
    document.getElementById('dc-username').textContent='Discord';
    setStatusLine('Status unavailable');
  }
}
loadDiscord();
setInterval(loadDiscord,30000);

const applyConfig=cfg=>{
  if(!cfg) return;
  const fonts=cfg.fonts||{};
  if(fonts.body)    document.documentElement.style.setProperty('--font-body',    fonts.body);
  if(fonts.name)    document.documentElement.style.setProperty('--font-name',    fonts.name);
  if(fonts.overlay) document.documentElement.style.setProperty('--font-overlay', fonts.overlay);
  if(fonts.googleCssUrl){
    let link=document.getElementById('font-config');
    if(!link){
      link=document.createElement('link');
      link.id='font-config';
      link.rel='stylesheet';
      document.head.appendChild(link);
    }
    link.href=fonts.googleCssUrl;
  }
  // socials: use config list if provided, else fall back to defaults
  renderSocials(cfg.socials || DEFAULT_CONFIG.socials);
};
const renderSocials=list=>{
  const container=document.getElementById('socials');
  if(!container) return;
  container.innerHTML='';
  (list||[]).forEach(item=>{
    const a=document.createElement('a');
    a.className='social-btn';
    a.href=item.href||'#';
    a.title=item.label||'';
    a.setAttribute('aria-label', item.label||'');
    if(item.newTab){
      a.target='_blank';
      a.rel='noopener noreferrer';
    }
    if(item.icon){
      if(item.icon.type==='svg' && item.icon.path){
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        svg.setAttribute('viewBox', item.icon.viewBox||'0 0 24 24');
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d', item.icon.path);
        svg.appendChild(path);
        a.appendChild(svg);
      } else if(item.icon.type==='img' && item.icon.src){
        const img=document.createElement('img');
        img.src=item.icon.src;
        img.alt=item.label||'';
        a.appendChild(img);
      } else if(item.icon.type==='ms' && item.icon.name){
        const span=document.createElement('span');
        span.className='material-symbols-outlined';
        span.textContent=item.icon.name;
        a.appendChild(span);
      }
    } else {
      a.textContent=item.label||'';
    }
    container.appendChild(a);
  });
};
applyConfig(DEFAULT_CONFIG);
fetch('config.json')
  .then(r=>r.ok?r.json():Promise.reject(r.status))
  .then(cfg=>applyConfig({
    fonts: { ...DEFAULT_CONFIG.fonts, ...(cfg.fonts||{}) },
    socials: cfg.socials || DEFAULT_CONFIG.socials
  }))
  .catch(()=>{});

// ══════════════════════════════════════════════
//  MUSIC PLAYER
// ══════════════════════════════════════════════
const audio=document.getElementById('audio-el');
const bgVideo=document.getElementById('bg-video');
const btnPlay=document.getElementById('btn-play');
const playIcon=document.getElementById('play-icon');
const vinyl=document.getElementById('vinyl');
const fillEl=document.getElementById('progress-fill');
const trackEl=document.getElementById('progress-track');
const timeCur=document.getElementById('time-cur');
const timeTot=document.getElementById('time-total');
const albumCover=document.getElementById('album-cover');
const musicIcon=document.getElementById('music-icon');
const fmt=s=>{const n=Math.floor(s);return`${Math.floor(n/60)}:${String(n%60).padStart(2,'0')}`;};
const setPlaybackUi=isPlaying=>{
  playIcon.textContent=isPlaying?'pause':'play_arrow';
  vinyl.style.animationPlayState=isPlaying?'running':'paused';
};

// Show album cover if music.png exists, hide vinyl/icon
const showAlbumCover=()=>{
  albumCover.classList.remove('hidden');
  vinyl.style.display='none';
  musicIcon.style.display='none';
};
const hideAlbumCover=()=>{
  albumCover.classList.add('hidden');
  vinyl.style.display='flex';
  musicIcon.style.display='flex';
};
albumCover.addEventListener('load', showAlbumCover);
albumCover.addEventListener('error', hideAlbumCover);
// Handle cached images that may load before listeners are attached
if(albumCover.complete){
  if(albumCover.naturalWidth>0) showAlbumCover();
  else hideAlbumCover();
}

audio.addEventListener('loadedmetadata',()=>timeTot.textContent=fmt(audio.duration));
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  fillEl.style.width=(audio.currentTime/audio.duration*100)+'%';
  timeCur.textContent=fmt(audio.currentTime);
});
audio.addEventListener('play',()=>setPlaybackUi(true));
audio.addEventListener('pause',()=>setPlaybackUi(false));
audio.addEventListener('ended',()=>setPlaybackUi(false));
btnPlay.addEventListener('click',()=>{
  if(audio.paused){audio.play();}
  else{audio.pause();}
});
trackEl.addEventListener('click',e=>{
  if(!audio.duration)return;
  const r=trackEl.getBoundingClientRect();
  audio.currentTime=(e.clientX-r.left)/r.width*audio.duration;
});
document.getElementById('btn-next').addEventListener('click',()=>audio.currentTime=Math.min(audio.currentTime+10,audio.duration||0));
document.getElementById('btn-prev').addEventListener('click',()=>audio.currentTime=Math.max(audio.currentTime-10,0));

// Try to autoplay on load; if blocked, retry on first user gesture
const tryAutoPlay=()=>{
  const p=audio.play();
  if(p&&typeof p.catch==='function') p.catch(()=>{});
};
const tryPlayVideo=()=>{
  if(!bgVideo) return;
  const p=bgVideo.play();
  if(p&&typeof p.catch==='function') p.catch(()=>{});
};
const gateOverlay=document.getElementById('gate-overlay');
const gateText=document.getElementById('gate-text');
const gateParticles=document.getElementById('gate-particles');
const spawnGateParticles=()=>{
  if(!gateText||!gateParticles||gateParticles.childElementCount) return;
  const r=gateText.getBoundingClientRect();
  const count=Math.max(50, Math.min(80, Math.floor((r.width*r.height)/35)));
  for(let i=0;i<count;i++){
    const p=document.createElement('span');
    p.className='gate-particle';
    const x=r.left+Math.random()*r.width;
    const y=r.top+Math.random()*r.height;
    const size=3+Math.random()*6.5;
    p.style.left=`${x}px`;
    p.style.top=`${y}px`;
    p.style.width=`${size}px`;
    p.style.height=`${size}px`;
    const dx=(Math.random()*2-1)*(80+Math.random()*200);
    const dy=(Math.random()*2-1)*(60+Math.random()*180);
    p.style.setProperty('--dx', `${dx}px`);
    p.style.setProperty('--dy', `${dy}px`);
    p.style.setProperty('--dur', `${0.9+Math.random()*1.1}s`);
    p.style.setProperty('--delay', `${Math.random()*0.22}s`);
    gateParticles.appendChild(p);
  }
};
const dismissGate=()=>{
  if(!gateOverlay||gateOverlay.classList.contains('dismiss')) return;
  spawnGateParticles();
  requestAnimationFrame(()=>gateOverlay.classList.add('dismiss'));
  setTimeout(()=>{ if(gateOverlay) gateOverlay.style.display='none'; }, 1700);
  tryAutoPlay();
  tryPlayVideo();
};
if(gateOverlay){
  gateOverlay.addEventListener('click', dismissGate);
  gateOverlay.addEventListener('touchstart', dismissGate, { passive:true });
  document.addEventListener('keydown', dismissGate, { once:true });
}
window.addEventListener('load', tryAutoPlay);
document.addEventListener('click', tryAutoPlay, { once:true });
document.addEventListener('touchstart', tryAutoPlay, { once:true });
document.addEventListener('keydown', tryAutoPlay, { once:true });

// ══════════════════════════════════════════════
//  CURSOR  — dot + lagging ring
// ══════════════════════════════════════════════
const cursorDot  = document.getElementById('cursor-dot');
const cursorRing = document.getElementById('cursor-ring');
let mouseX=0, mouseY=0, ringX=0, ringY=0, cursorVisible=false;

const showCursor = () => {
  if(cursorVisible) return;
  cursorVisible = true;
  cursorDot.style.display  = 'block';
  cursorRing.style.display = 'block';
};

document.addEventListener('mousemove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  cursorDot.style.left = mouseX + 'px';
  cursorDot.style.top  = mouseY + 'px';
  showCursor();
});
document.addEventListener('mouseleave', () => {
  cursorDot.style.opacity  = '0';
  cursorRing.style.opacity = '0';
});
document.addEventListener('mouseenter', () => {
  cursorDot.style.opacity  = '1';
  cursorRing.style.opacity = '1';
});

// hover state on interactive elements
document.querySelectorAll('a,button,input,[tabindex]').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
});

(function animRing(){
  ringX += (mouseX - ringX) * 0.18;
  ringY += (mouseY - ringY) * 0.18;
  cursorRing.style.left = ringX + 'px';
  cursorRing.style.top  = ringY + 'px';
  requestAnimationFrame(animRing);
})();

if(window.matchMedia('(pointer: coarse)').matches){
  cursorDot.style.display  = 'none';
  cursorRing.style.display = 'none';
}

// ══════════════════════════════════════════════
//  URL HASH WAVEFORM ANIMATION
// ══════════════════════════════════════════════
const hashWave = '▁▂▃▅▆▇▆▅▃▂▁';
let hashOff = 0;
setInterval(() => {
  const w = hashWave;
  const rotated = w.slice(hashOff % w.length) + w.slice(0, hashOff % w.length);
  history.replaceState(null, '', '#' + rotated);
  hashOff = (hashOff + 1) % w.length;
}, 130);

// ══════════════════════════════════════════════
//  TITLE TYPING EFFECT
// ══════════════════════════════════════════════
(function(){
  const full = "Farmernet's website";
  const caret = '█';
  let idx = 0, dir = 1, pauseTimer = null;

  const step = () => {
    idx += dir;
    document.title = full.slice(0, idx) + caret;
    if(dir === 1 && idx >= full.length){
      dir = -1;
      pauseTimer = setTimeout(step, 2200);
    } else if(dir === -1 && idx <= 0){
      dir = 1;
      pauseTimer = setTimeout(step, 600);
    } else {
      const delay = dir === 1 ? 70 + Math.random()*55 : 40 + Math.random()*30;
      pauseTimer = setTimeout(step, delay);
    }
  };
  step();
})();
</script>
