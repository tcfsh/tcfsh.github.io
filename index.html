<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Nothing important but just a website">
<title>Farmernet's website</title>
<link rel="icon" type="image/svg+xml" href="icon.svg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Noto+Serif+HK:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/effects.css">
<link rel="preload" href="styles/player.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="styles/player.css"></noscript>

<body>

<div class="gate-overlay" id="gate-overlay">
  <div class="gate-text" id="gate-text">here's my secret base</div>
  <div class="gate-particles" id="gate-particles"></div>
</div>
<div class="cursor-dot"  id="cursor-dot"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<div class="tv-screen">
  <!--
    preload="none" — video bytes are not fetched until the user dismisses the gate.
    Use an existing local image as poster to avoid 404 on missing poster assets.
    MP4 is the primary source.
  -->
  <video id="bg-video" muted loop playsinline preload="none">
    <source src="https://r2.guns.lol/6f5ba0f9-9523-47ec-85f2-23f827d8d3ee.mp4" type="video/mp4">
  </video>
  <canvas id="tv-noise"></canvas>
  <div class="scanlines"></div>
  <div class="crt-flicker"></div>
  <div class="crt-roll"></div>
</div>

<div id="scene">
  <div class="card glass-panel" id="card">
    <div class="card-glow"></div>

    <!-- Avatar -->
    <div class="avatar-row">
      <div class="avatar-ring"><img src="avatar.gif" alt="Avatar" width="88" height="88" decoding="async" loading="lazy" fetchpriority="low"></div>
    </div>

    <!-- Body -->
    <div class="card-body">

      <h1 class="name" data-text="網路農夫">網路農夫</h1>

      <div class="divider"></div>

      <p class="bio">
        請輸入文本請輸入文本<br>
        請輸入文本請輸入文本請輸入文本<br>
        <span style="font-size:10px;letter-spacing:0.14em;color:rgba(255,255,255,0.18);">請輸入文本請輸入文本</span>
      </p>

      <div class="divider"></div>

      <!-- Discord Status -->
      <div class="discord-box">
        <div class="dc-top">
          <div class="dc-av-wrap">
            <div class="dc-avatar" id="dc-avatar">
              <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 00-4.885-1.515.074.074 0 00-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 00-5.487 0 12.64 12.64 0 00-.617-1.25.077.077 0 00-.079-.037A19.736 19.736 0 003.677 4.37a.07.07 0 00-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 00.031.057 19.9 19.9 0 005.993 3.03.078.078 0 00.084-.028 14.09 14.09 0 001.226-1.994.076.076 0 00-.041-.106 13.107 13.107 0 01-1.872-.892.077.077 0 01-.008-.128 10.2 10.2 0 00.372-.292.074.074 0 01.077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 01.078.01c.12.098.246.198.373.292a.077.077 0 01-.006.127 12.299 12.299 0 01-1.873.892.077.077 0 00-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 00.084.028 19.839 19.839 0 006.002-3.03.077.077 0 00.032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 00-.031-.03z"/></svg>
            </div>
            <img class="dc-avatar-deco" src="https://cdn.discordapp.com/avatar-decoration-presets/a_8bb33310339200d8d40024583ed95d4a.png" alt="" aria-hidden="true" decoding="async" loading="lazy" onerror="this.style.display='none'">
            <div class="dc-dot offline" id="dc-dot"></div>
          </div>
          <div class="dc-head">
            <div class="dc-identity">
              <div class="dc-username" id="dc-username">載入中…</div>
              <div class="dc-server-tag" id="dc-server-tag">
                <img class="dc-server-icon" src="servertag.png" alt="" decoding="async" loading="lazy" onerror="this.style.display='none'">
                <span class="dc-server-label">CODE</span>
              </div>
              <div class="dc-badges" id="dc-badges">
                <img class="dc-badge-icon" src="nitrobadge.png" alt="Nitro" decoding="async" loading="lazy" onerror="this.style.display='none'">
                <img class="dc-badge-icon" src="hypesquadbadge.png" alt="HypeSquad" decoding="async" loading="lazy" onerror="this.style.display='none'">
              </div>
            </div>
            <div class="dc-tag"         id="dc-tag"></div>
            <div class="dc-status-text" id="dc-status-text"></div>
          </div>
        </div>
        <!-- Activity row (hidden until loaded) -->
        <div class="dc-activity-row" id="dc-activity-row">
          <div class="dc-act-img" id="dc-act-img">
            <div class="dc-act-img-small" id="dc-act-img-small" style="display:none"></div>
          </div>
          <div class="dc-act-info">
            <div class="dc-act-label"   id="dc-act-label">Playing</div>
            <div class="dc-act-name"    id="dc-act-name"></div>
            <div class="dc-act-detail"  id="dc-act-detail"></div>
            <div class="dc-act-elapsed" id="dc-act-elapsed"></div>
          </div>
        </div>
      </div>

      <!-- Social icons configured via config.json -->
      <div class="socials" id="socials"></div>

    </div><!-- /card-body -->
  </div><!-- /card -->

  <!-- Music Player -->
  <div class="player glass-panel" id="player">
    <div class="player-glow"></div>
    <div class="player-body">

      <!-- Album Art -->
      <div class="player-album-art">
        <img class="album-cover-img hidden" id="album-cover" src="music.png" alt="Album Cover" width="72" height="72" decoding="async">
        <div class="vinyl" id="vinyl"></div>
        <div class="music-icon" id="music-icon">
          <span class="material-symbols-outlined">music_note</span>
        </div>
      </div>

      <!-- Right: track info + progress + controls -->
      <div class="player-right">
        <div class="player-track-info">
          <div class="track-name"   id="track-name">自由に捕らわれる。</div>
          <div class="track-artist" id="track-artist">カンザキイオリ</div>
        </div>

        <div class="player-progress-row">
          <span class="time-label"     id="time-cur">0:00</span>
          <div  class="progress-track" id="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <span class="time-label end" id="time-total">0:00</span>
        </div>

        <div class="player-controls">
          <button class="ctrl-btn"           id="btn-prev"><span class="material-symbols-outlined">skip_previous</span></button>
          <button class="ctrl-btn play-btn"  id="btn-play"><span class="material-symbols-outlined" id="play-icon">play_arrow</span></button>
          <button class="ctrl-btn"           id="btn-next"><span class="material-symbols-outlined">skip_next</span></button>
        </div>
      </div>

    </div>
  </div>

</div><!-- /scene -->

<audio id="audio-el" preload="none" autoplay>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
'use strict';

// ── requestIdleCallback polyfill ──
const onIdle = window.requestIdleCallback
  ? cb => requestIdleCallback(cb, { timeout: 2000 })
  : cb => setTimeout(cb, 1);

// ── Low-end device detection → disable heavy animations ──
(function detectLowEnd() {
  const lowCPU = navigator.hardwareConcurrency != null && navigator.hardwareConcurrency <= 4;
  const lowRAM = navigator.deviceMemory    != null && navigator.deviceMemory    <= 2;
  if (lowCPU || lowRAM) document.documentElement.classList.add('reduced-motion');
})();

// ── Music player (critical path — runs immediately) ──
const audio      = document.getElementById('audio-el');
const bgVideo    = document.getElementById('bg-video');
const btnPlay    = document.getElementById('btn-play');
const playIcon   = document.getElementById('play-icon');
const vinyl      = document.getElementById('vinyl');
const fillEl     = document.getElementById('progress-fill');
const trackEl    = document.getElementById('progress-track');
const timeCur    = document.getElementById('time-cur');
const timeTot    = document.getElementById('time-total');
const albumCover = document.getElementById('album-cover');
const musicIcon  = document.getElementById('music-icon');

const fmt = s => { const n = Math.floor(s); return `${Math.floor(n/60)}:${String(n%60).padStart(2,'0')}`; };
const setPlaybackUi = isPlaying => {
  playIcon.textContent = isPlaying ? 'pause' : 'play_arrow';
  vinyl.style.animationPlayState = isPlaying ? 'running' : 'paused';
};

const showAlbumCover = () => { albumCover.classList.remove('hidden'); vinyl.style.display='none'; musicIcon.style.display='none'; };
const hideAlbumCover = () => { albumCover.classList.add('hidden');    vinyl.style.display='flex'; musicIcon.style.display='flex'; };
albumCover.addEventListener('load',  showAlbumCover);
albumCover.addEventListener('error', hideAlbumCover);
if (albumCover.complete) { albumCover.naturalWidth > 0 ? showAlbumCover() : hideAlbumCover(); }

audio.addEventListener('loadedmetadata', () => timeTot.textContent = fmt(audio.duration));
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  fillEl.style.width = (audio.currentTime / audio.duration * 100) + '%';
  timeCur.textContent = fmt(audio.currentTime);
});
audio.addEventListener('play',  () => setPlaybackUi(true));
audio.addEventListener('pause', () => setPlaybackUi(false));
audio.addEventListener('ended', () => setPlaybackUi(false));

btnPlay.addEventListener('click', () => { audio.paused ? audio.play() : audio.pause(); });
trackEl.addEventListener('click', e => {
  if (!audio.duration) return;
  const r = trackEl.getBoundingClientRect();
  audio.currentTime = (e.clientX - r.left) / r.width * audio.duration;
});
document.getElementById('btn-next').addEventListener('click', () => audio.currentTime = Math.min(audio.currentTime + 10, audio.duration || 0));
document.getElementById('btn-prev').addEventListener('click', () => audio.currentTime = Math.max(audio.currentTime - 10, 0));

// ── Autoplay helpers ──
const tryAutoPlay = () => {
  if (audio.preload === 'none') {
    audio.preload = 'metadata';
    audio.load();
  }
  const p = audio.play();
  if (p?.catch) p.catch(() => {});
};
const tryPlayVideo = () => {
  if (!bgVideo) return;
  // Trigger the video to load if it hasn't yet, then play
  if (bgVideo.preload === 'none') { bgVideo.preload = 'auto'; bgVideo.load(); }
  const p = bgVideo.play(); if (p?.catch) p.catch(() => {});
};

// ── Gate overlay ──
const gateOverlay   = document.getElementById('gate-overlay');
const gateText      = document.getElementById('gate-text');
const gateParticles = document.getElementById('gate-particles');

const spawnGateParticles = () => {
  if (!gateText || !gateParticles || gateParticles.childElementCount) return;
  const r     = gateText.getBoundingClientRect();
  const count = Math.max(24, Math.min(42, Math.floor((r.width * r.height) / 80)));
  const frag  = document.createDocumentFragment();
  for (let i = 0; i < count; i++) {
    const p    = document.createElement('span');
    p.className = 'gate-particle';
    const size  = 3 + Math.random() * 6.5;
    p.style.cssText = `left:${r.left + Math.random() * r.width}px;top:${r.top + Math.random() * r.height}px;width:${size}px;height:${size}px`;
    p.style.setProperty('--dx',    `${(Math.random()*2-1)*(80+Math.random()*200)}px`);
    p.style.setProperty('--dy',    `${(Math.random()*2-1)*(60+Math.random()*180)}px`);
    p.style.setProperty('--dur',   `${0.9+Math.random()*1.1}s`);
    p.style.setProperty('--delay', `${Math.random()*0.22}s`);
    frag.appendChild(p);
  }
  gateParticles.appendChild(frag);
};

const dismissGate = () => {
  if (!gateOverlay || gateOverlay.classList.contains('dismiss')) return;
  spawnGateParticles();
  requestAnimationFrame(() => gateOverlay.classList.add('dismiss'));
  setTimeout(() => { if (gateOverlay) gateOverlay.style.display = 'none'; }, 1700);
  if (window.__unlockCustomCursor) window.__unlockCustomCursor();
  if (window.__startHeavyStuffOnce) window.__startHeavyStuffOnce();
  tryAutoPlay();
  tryPlayVideo();
};

if (gateOverlay) {
  gateOverlay.addEventListener('click',      dismissGate);
  gateOverlay.addEventListener('touchstart', dismissGate, { passive: true });
  document.addEventListener('keydown',       dismissGate, { once: true });
}
window.addEventListener('load',       tryAutoPlay);
document.addEventListener('click',      tryAutoPlay, { once: true });
document.addEventListener('touchstart', tryAutoPlay, { once: true });
document.addEventListener('keydown',    tryAutoPlay, { once: true });

// ── Custom cursor (critical path; keeps first paint smooth) ──
(function initCursor() {
  const cursorDot  = document.getElementById('cursor-dot');
  const cursorRing = document.getElementById('cursor-ring');
  if (!cursorDot || !cursorRing) return;
  if (window.matchMedia('(pointer: coarse)').matches) return;

  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;
  let ringX = mouseX;
  let ringY = mouseY;
  let dotX = mouseX;
  let dotY = mouseY;
  let cursorVisible = false;
  let unlocked = false;

  window.__unlockCustomCursor = () => {
    unlocked = true;
    document.body.classList.add('cursor-enabled');
  };

  const renderDot = () => {
    cursorDot.style.transform = `translate3d(${dotX}px, ${dotY}px, 0) translate(-50%,-50%)`;
  };
  const renderRing = () => {
    ringX += (mouseX - ringX) * 0.28;
    ringY += (mouseY - ringY) * 0.28;
    cursorRing.style.transform = `translate3d(${ringX}px, ${ringY}px, 0) translate(-50%,-50%)`;
    requestAnimationFrame(renderRing);
  };

  const showCursor = () => {
    if (cursorVisible) return;
    cursorVisible = true;
    cursorDot.style.display = 'block';
    cursorRing.style.display = 'block';
    renderDot();
  };

  document.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
    dotX = mouseX; dotY = mouseY;
    if (!unlocked) return;
    renderDot();
    showCursor();
  }, { passive: true });

  document.addEventListener('mouseleave', () => {
    if (!unlocked) return;
    cursorDot.style.opacity = '0';
    cursorRing.style.opacity = '0';
  });
  document.addEventListener('mouseenter', () => {
    if (!unlocked) return;
    cursorDot.style.opacity = '1';
    cursorRing.style.opacity = '1';
  });

  const interactiveSelector = 'a,button,input,[tabindex],.social-btn';
  document.addEventListener('mouseover', e => {
    if (!unlocked) return;
    const t = e.target;
    if (t instanceof Element && t.closest(interactiveSelector)) {
      document.body.classList.add('cursor-hover');
    }
  });
  document.addEventListener('mouseout', e => {
    const t = e.target;
    if (!(t instanceof Element) || !t.closest(interactiveSelector)) return;
    const related = e.relatedTarget;
    if (related instanceof Element && related.closest(interactiveSelector)) return;
    document.body.classList.remove('cursor-hover');
  });

  requestAnimationFrame(renderRing);
})();

// ════════════════════════════════════════════════
//  HEAVY STUFF — deferred to idle time
// ════════════════════════════════════════════════
function initHeavyStuff() {

  // ── CRT TV noise — optimised static grain ──
  (function initNoise() {
    const cv    = document.getElementById('tv-noise');
    const ctx   = cv.getContext('2d');
    const SCALE = 4;
    let W, H, nW, nH;
    const offscreen = document.createElement('canvas');
    const octx      = offscreen.getContext('2d');
    const resize = () => {
      W = window.innerWidth; H = window.innerHeight;
      cv.width = W; cv.height = H;
      nW = Math.ceil(W / SCALE); nH = Math.ceil(H / SCALE);
      offscreen.width = nW; offscreen.height = nH;
      ctx.imageSmoothingEnabled = false;
    };
    window.addEventListener('resize', resize); resize();

    let lastFrame = 0;
    const INTERVAL = 1000 / 20; // 20 fps

    // Skip noise entirely on reduced-motion devices
    if (document.documentElement.classList.contains('reduced-motion')) return;

    function frame(ts) {
      requestAnimationFrame(frame);
      if (ts - lastFrame < INTERVAL) return;
      lastFrame = ts;
      const imgd = octx.createImageData(nW, nH);
      const d    = imgd.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = (Math.random() * 255) | 0;
        d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
      }
      octx.putImageData(imgd, 0, 0);
      ctx.drawImage(offscreen, 0, 0, W, H);
    }
    requestAnimationFrame(frame);
  })();

  // ── 3D tilt helper ──
  function makeTilt(el) {
    if (!el) return;
    let on = false;
    el.addEventListener('mouseenter', () => { on = true;  el.style.transition = 'transform 0.08s ease-out,box-shadow 0.4s ease'; });
    el.addEventListener('mouseleave', () => { on = false; el.style.transition = 'transform 0.5s ease,box-shadow 0.4s ease'; el.style.transform = 'rotateX(0)rotateY(0)'; el.style.boxShadow = ''; });
    el.addEventListener('mousemove', e => {
      if (!on) return;
      const r  = el.getBoundingClientRect();
      const dx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
      const dy = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
      el.style.transform  = `rotateY(${dx*8}deg) rotateX(${-dy*8}deg)`;
      el.style.boxShadow  = `${-dx*16}px ${dy*16}px 55px rgba(0,0,0,0.8),0 0 0 1px rgba(255,255,255,0.07),0 0 ${28+Math.abs(dx)*16}px rgba(255,255,255,0.05)`;
    });
  }
  makeTilt(document.getElementById('card'));
  makeTilt(document.getElementById('player'));

  // ── Discord status (Lanyard API) ──
  // ① 將 DISCORD_ID 換成你的 Discord 數字 ID
  // ② 加入 Lanyard 伺服器：discord.gg/lanyard
  const DISCORD_ID  = '1116705555461984298'; // ← 改這裡
  let activityTimer = null;

  const statusLabel = { online:'Online', idle:'Idle', dnd:'Do Not Disturb', offline:'Invisible' };
  const setStatusLine = text => {
    const el = document.getElementById('dc-status-text');
    if (el) el.textContent = text || '';
  };

  const fmtElapsed = ms => {
    const s=Math.floor(ms/1000), m=Math.floor(s/60), h=Math.floor(m/60);
    return h > 0
      ? `${h}:${String(m%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')} elapsed`
      : `${m}:${String(s%60).padStart(2,'0')} elapsed`;
  };

  const startElapsed = startTs => {
    clearInterval(activityTimer);
    activityTimer = setInterval(() => {
      const el = document.getElementById('dc-act-elapsed');
      if (el) el.textContent = fmtElapsed(Date.now() - startTs);
    }, 1000);
  };

  async function loadDiscord() {
    if (DISCORD_ID === 'YOUR_DISCORD_USER_ID') {
      document.getElementById('dc-username').textContent = 'Set your Discord ID';
      setStatusLine('See HTML script section');
      return;
    }
    try {
      const res  = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
      const j    = await res.json();
      if (!j.success) throw 0;
      const d = j.data, u = d.discord_user;

      // Avatar
      if (u.avatar) {
        const ext = u.avatar.startsWith('a_') ? 'gif' : 'png';
        document.getElementById('dc-avatar').innerHTML =
          `<img src="https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.${ext}?size=80" alt="">`;
      }

      // Username / tag
      document.getElementById('dc-username').textContent = u.global_name || u.username;
      document.getElementById('dc-tag').textContent =
        u.discriminator && u.discriminator !== '0'
          ? `@${u.username}#${u.discriminator}`
          : `@${u.username}`;

      // Status dot
      document.getElementById('dc-dot').className = 'dc-dot ' + (d.discord_status || 'offline');

      // Custom status (type 4)
      const customAct = d.activities?.find(a => a.type === 4);
      setStatusLine(customAct ? customAct.state || statusLabel[d.discord_status] || '' : statusLabel[d.discord_status] || 'Invisible');

      // Rich activity (type 0 = game/app, type 2 = music)
      const act   = d.activities?.find(a => a.type === 0 || a.type === 2);
      const rowEl = document.getElementById('dc-activity-row');
      clearInterval(activityTimer);

      if (act) {
        rowEl.style.display = 'flex';
        const typeMap = { 0:'Playing', 2:'Listening to', 3:'Watching', 5:'Competing in' };
        document.getElementById('dc-act-label').textContent  = typeMap[act.type] || 'Playing';
        document.getElementById('dc-act-name').textContent   = act.name || '';
        document.getElementById('dc-act-detail').textContent = [act.details, act.state].filter(Boolean).join(' · ');

        const imgWrap = document.getElementById('dc-act-img');
        const appId   = act.application_id;
        if (act.assets?.large_image) {
          let src = act.assets.large_image;
          src = src.startsWith('mp:external/')
            ? 'https://media.discordapp.net/' + src.replace('mp:','')
            : appId ? `https://cdn.discordapp.com/app-assets/${appId}/${src}.png` : src;
          imgWrap.innerHTML = `<img src="${src}" alt=""><div class="dc-act-img-small" id="dc-act-img-small"></div>`;
          if (act.assets?.small_image) {
            let sm = act.assets.small_image;
            sm = sm.startsWith('mp:external/')
              ? 'https://media.discordapp.net/' + sm.replace('mp:','')
              : appId ? `https://cdn.discordapp.com/app-assets/${appId}/${sm}.png` : sm;
            const small = imgWrap.querySelector('.dc-act-img-small');
            small.innerHTML = `<img src="${sm}" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
            small.style.display = 'block';
          }
        } else if (appId) {
          imgWrap.innerHTML = `<img src="https://cdn.discordapp.com/app-icons/${appId}/icon.png" alt="" style="width:100%;height:100%;object-fit:cover;border-radius:6px;">`;
        } else {
          imgWrap.innerHTML = '';
        }

        if (act.timestamps?.start) {
          startElapsed(act.timestamps.start);
          document.getElementById('dc-act-elapsed').textContent = fmtElapsed(Date.now() - act.timestamps.start);
        } else {
          document.getElementById('dc-act-elapsed').textContent = '';
        }
      } else {
        rowEl.style.display = 'none';
      }
    } catch(e) {
      document.getElementById('dc-username').textContent = 'Discord';
      setStatusLine('Status unavailable');
    }
  }
  loadDiscord();
  setInterval(loadDiscord, 30000);

  // ── Config (fonts + socials) ──
  const DEFAULT_CONFIG = {
    fonts: {
      googleCssUrl: 'https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Noto+Serif+HK:wght@400;500;700&display=swap',
      body:    "'Noto Serif HK', serif",
      name:    "'Noto Serif HK', serif",
      overlay: "'Covered By Your Grace', cursive"
    },
    socials: [
      { label:'TikTok',     href:'#', icon:{ type:'svg', viewBox:'0 0 24 24', path:'M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.74a4.85 4.85 0 01-1.01-.05z' } },

  const applyConfig = cfg => {
    if (!cfg) return;
    const fonts = cfg.fonts || {};
    if (fonts.body)    document.documentElement.style.setProperty('--font-body',    fonts.body);
    if (fonts.name)    document.documentElement.style.setProperty('--font-name',    fonts.name);
    if (fonts.overlay) document.documentElement.style.setProperty('--font-overlay', fonts.overlay);
    if (fonts.googleCssUrl) {
      let link = document.getElementById('font-config');
      if (!link) { link = document.createElement('link'); link.id = 'font-config'; link.rel = 'stylesheet'; document.head.appendChild(link); }
      link.href = fonts.googleCssUrl;
    }
    renderSocials(cfg.socials || DEFAULT_CONFIG.socials);
  };

  const renderSocials = list => {
    const container = document.getElementById('socials');
    if (!container) return;
    container.innerHTML = '';
    const frag = document.createDocumentFragment();
    (list || []).forEach(item => {
      const a = document.createElement('a');
      a.className = 'social-btn';
      a.href  = item.href  || '#';
      a.title = item.label || '';
      a.setAttribute('aria-label', item.label || '');
      if (item.newTab) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
      if (item.icon) {
        if (item.icon.type === 'svg' && item.icon.path) {
          const svg  = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('viewBox', item.icon.viewBox || '0 0 24 24');
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', item.icon.path);
          svg.appendChild(path); a.appendChild(svg);
        } else if (item.icon.type === 'img' && item.icon.src) {
          const img = document.createElement('img'); img.src = item.icon.src; img.alt = item.label || ''; a.appendChild(img);
        } else if (item.icon.type === 'ms' && item.icon.name) {
          const span = document.createElement('span'); span.className = 'material-symbols-outlined'; span.textContent = item.icon.name; a.appendChild(span);
        }
      } else {
        a.textContent = item.label || '';
      }
      frag.appendChild(a);
    });
    container.appendChild(frag);
  };

  applyConfig(DEFAULT_CONFIG);
  fetch('config.json')
    .then(r => r.ok ? r.json() : Promise.reject(r.status))
    .then(cfg => applyConfig({
      fonts:   { ...DEFAULT_CONFIG.fonts, ...(cfg.fonts || {}) },
      socials: cfg.socials || DEFAULT_CONFIG.socials
    }))
    .catch(() => {});

  // ── URL hash waveform animation ──
  // Keep the effect, but run at a lower frequency to reduce overhead.
  const hashWave = '▁▂▃▅▆▇▆▅▃▂▁';
  let hashOff = 0;
  setInterval(() => {
    const off = hashOff % hashWave.length;
    const rotated = hashWave.slice(off) + hashWave.slice(0, off);
    history.replaceState(null, '', '#' + rotated);
    hashOff = (hashOff + 1) % hashWave.length;
  }, 240);

  // ── Title typing effect ──
  (function initTyping() {
    const full  = "Farmernet's website";
    const caret = '█';
    let idx = 0, dir = 1, timer = null;
    const step = () => {
      idx += dir;
      document.title = full.slice(0, idx) + caret;
      if (dir === 1 && idx >= full.length) {
        dir = -1; timer = setTimeout(step, 2200);
      } else if (dir === -1 && idx <= 0) {
        dir = 1; timer = setTimeout(step, 600);
      } else {
        timer = setTimeout(step, dir === 1 ? 70 + Math.random()*55 : 40 + Math.random()*30);
      }
    };
    step();
  })();

} // end initHeavyStuff

// Kick off heavy stuff only after gate dismisses (or immediately when no gate).
let heavyStarted = false;
window.__startHeavyStuffOnce = () => {
  if (heavyStarted) return;
  heavyStarted = true;
  onIdle(initHeavyStuff);
};
if (!gateOverlay) window.__startHeavyStuffOnce();
